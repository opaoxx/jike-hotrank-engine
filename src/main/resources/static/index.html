<!DOCTYPE html>
<html lang="zh-CN" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <title>即刻热点榜单引擎 — 仪表盘</title>
  <link rel="stylesheet" href="/css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"
          integrity="sha384-vsrfeLOOY6KuIYKDlmVH5UiBmgIdB1oEf7p01YgWHuqmOHfZr374+odEv96n9tNC"
          crossorigin="anonymous"></script>
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar">
    <span class="navbar-brand">🔥 即刻热点引擎</span>
    <div class="navbar-right">
      <span class="sse-indicator">
        <span id="sse-dot" class="sse-dot disconnected"></span>
        <span id="sse-text">实时推送：● 连接中…</span>
      </span>
      <span class="refresh-timer" id="refresh-timer">刷新：30s</span>
    </div>
  </nav>

  <!-- Tab 栏 -->
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="overview">📊 总览</button>
    <button class="tab-btn" data-tab="global">🌐 全站热榜</button>
    <button class="tab-btn" data-tab="circle">⭕ 圈子</button>
    <button class="tab-btn" data-tab="newcomer">🆕 新星榜</button>
    <button class="tab-btn" data-tab="surging">🚀 飙升榜</button>
  </div>

  <!-- 主内容区 -->
  <div class="main-content" id="main-content">
    <div class="loading"><div class="spinner"></div> 加载中…</div>
  </div>

  <!-- 互动模拟器 -->
  <div class="main-content">
    <div class="panel">
      <div class="panel-header collapsible-toggle" id="sim-toggle">🧪 互动模拟器 <span style="font-size:14px;color:var(--text-muted)">▼</span></div>
      <div class="panel-body collapsible-content" id="sim-content">
        <form id="interaction-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="sim-topicId">话题 <span translate="no">ID</span> *</label>
              <input type="number" id="sim-topicId" min="1" value="1" required>
            </div>
            <div class="form-group">
              <label for="sim-userId">用户 <span translate="no">ID</span> *</label>
              <input type="number" id="sim-userId" min="1" value="9001" required>
            </div>
            <div class="form-group">
              <label for="sim-type">互动类型 *</label>
              <select id="sim-type">
                <option value="1">👍 点赞</option>
                <option value="2">🔖 收藏</option>
                <option value="3">📤 转发</option>
                <option value="5">💬 评论</option>
              </select>
            </div>
            <div class="form-group">
              <label for="sim-device">设备指纹</label>
              <input type="text" id="sim-device" placeholder="device_001" maxlength="100">
            </div>
            <div class="form-group">
              <label for="sim-ip"><span translate="no">IP</span> 地址</label>
              <input type="text" id="sim-ip" placeholder="192.168.1.100" maxlength="50">
            </div>
            <div class="form-group">
              <label>&nbsp;</label>
              <button type="submit" class="btn btn-primary" id="interaction-submit">提交互动</button>
            </div>
          </div>
        </form>
        <div id="interaction-result"></div>
      </div>
    </div>
  </div>

  <!-- 话题详情弹窗 -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">话题详情</h2>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast 消息 -->
  <div class="toast-container" id="toast-container"></div>

  <!-- 脚本 -->
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
  <script>
    document.getElementById('sim-toggle').addEventListener('click', function() {
      const content = document.getElementById('sim-content');
      content.classList.toggle('open');
      const arrow = this.querySelector('span');
      arrow.textContent = content.classList.contains('open') ? '▲' : '▼';
    });
  </script>
</body>
</html>
