spring:
  application:
    name: jike-hotrank-engine
  datasource:
    url: jdbc:mysql://localhost:3306/jike_hotrank?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jike.hotrank.engine.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.jike.hotrank.engine: info
    com.jike.hotrank.engine.mapper: debug
    com.jike.hotrank.engine.task: info
    com.jike.hotrank.engine.cache: info
    com.jike.hotrank.engine.service: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

jike-hotrank:
  scheduling:
    enabled: true
  heat:
    weights:
      like: 1
      bookmark: 2
      share: 3
      comment: 5
  anti-spam:
    frequency:
      enabled: true
      window-hours: 24
      max-interactions: 50
    device:
      enabled: true
      window-hours: 24
      first-penalty-user-threshold: 3
      second-penalty-user-threshold: 5
      first-penalty-multiplier: 0.5
      second-penalty-multiplier: 0.3
    surge:
      enabled: true
      current-window-hours: 1
      history-window-hours: 24
      multiplier-threshold: 10
      minimum-current-count: 10
  performance:
    token: perf_test_token
    max-qps: 200
    max-duration-seconds: 30
    max-threads: 64
  operations:
    token: ops_demo_token
